<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | ZeroShare</title>
<link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
    .error-container { text-align: center; margin-top: 10vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .error-code { font-size: 8rem; font-weight: 700; background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 1rem; }
    .error-icon { width: 80px; height: 80px; color: var(--accent-color); margin-bottom: 1.5rem; }
</style>
</head>
<body data-theme="dark">
<div class="ambient-background"></div>
<nav class="navbar">
<div class="container nav-container">
<a href="/" class="brand"><i data-lucide="zap" class="brand-icon"></i><span>ZeroShare</span></a>
</div>
</nav>
<main class="container error-container">
<i data-lucide="file-question" class="error-icon"></i>
<div class="error-code">404</div>
<h1 style="margin-bottom: 1rem; font-family: 'Outfit', sans-serif;">Connection Lost in the Void</h1>
<p style="color: var(--text-muted); margin-bottom: 2.5rem; max-width: 400px;">The secure tunnel you are looking for does not exist or has been closed. Let's get you back to safety.</p>
<a href="/" class="btn-primary" style="text-decoration: none;">Return to ZeroShare</a>
</main>
<script>lucide.createIcons();</script>
</body>
</html>
