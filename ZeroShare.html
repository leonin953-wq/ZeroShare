<body data-theme="dark">
<div class="ambient-background"></div>
<nav class="navbar">
<div class="container nav-container">
<a href="/" class="brand"><i data-lucide="zap" class="brand-icon"></i><span>ZeroShare</span></a>
<div class="nav-links">
<button id="tabApp" class="nav-btn active">App</button>
<button id="tabHistory" class="nav-btn">History</button>
</div>
<div class="status-badge" id="connectionStatus"><span class="dot disconnected"></span> Waiting...</div>
</div>
</nav>
<main class="container">
<div id="appView">
<header class="page-header">
<h1 class="gradient-text">E2EE File Drop</h1>
</header>
<article class="card glass-panel" id="mainPanel">
<div id="setupSection" class="section-active">
<h2 class="section-title"><i data-lucide="link"></i> Secure Connection</h2>
<div class="id-display-box">
<span>Your ID:</span><strong id="myPeerId">Generating...</strong>
<button class="icon-btn" id="copyIdBtn"><i data-lucide="copy"></i></button>
</div>
<div class="input-group" style="margin-top: 2rem;">
<label for="targetPeerId">Connect to Peer</label>
<div style="display: flex; gap: 0.5rem;">
<input type="text" id="targetPeerId" placeholder="Paste ID...">
<button id="connectBtn" class="btn-primary" style="width: auto;">Connect</button>
</div>
</div>
</div>
<div id="transferSection" style="display: none;">
<h2 class="section-title"><i data-lucide="lock"></i> Active</h2>
<div class="file-upload-wrapper" style="margin-top: 1.5rem;">
<input type="file" id="fileInput">
<div class="file-upload-visual">
<i data-lucide="upload-cloud" style="width: 32px; height: 32px;"></i>
<span>Select file to encrypt & send</span>
</div>
</div>
<div class="progress-container" id="progressContainer" style="display: none; margin-top: 1.5rem;">
<div class="progress-info">
<span id="transferLabel">Sending...</span>
<span id="transferPercent">0%</span>
</div>
<div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
</div>
<div id="receivedFiles" style="margin-top: 2rem;"></div>
</div>
</article>
</div>
<div id="historyView" style="display: none;">
<header class="page-header">
<h1 class="gradient-text">Activity Log</h1>
</header>
<article class="card glass-panel">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
<h2 class="section-title"><i data-lucide="clock"></i> Recent Transfers</h2>
<button id="clearHistoryBtn" class="icon-btn" style="color: #ef4444;"><i data-lucide="trash-2"></i></button>
</div>
<div id="historyList" class="history-list"></div>
</article>
</div>
</main>
<footer class="site-footer">

</body>
